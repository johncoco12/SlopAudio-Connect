name: Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: SlopAudioConnect
            archive: SlopAudio-Connect-linux.tar.gz
          - os: macos-13
            artifact: SlopAudioConnect.app
            archive: SlopAudio-Connect-macos.zip
          - os: windows-latest
            artifact: SlopAudioConnect.exe
            archive: SlopAudio-Connect-windows.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake ninja-build libcurl4-openssl-dev \
            libasound2-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libfreetype-dev libfontconfig-dev \
            libgl-dev libglu1-mesa-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja curl

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install curl:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV
          echo "VCPKG_TARGET_TRIPLET=x64-windows" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ${{ runner.os == 'Windows' && '-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows' || '' }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp "build/SlopAudioConnect_artefacts/Release/SlopAudio Connect" dist/ 2>/dev/null || \
          cp "build/SlopAudioConnect_artefacts/SlopAudio Connect" dist/
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp -r "build/SlopAudioConnect_artefacts/Release/SlopAudio Connect.app" dist/ 2>/dev/null || \
          cp -r "build/SlopAudioConnect_artefacts/SlopAudio Connect.app" dist/
          cd dist && zip -r ../${{ matrix.archive }} .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          $search = @(
            "build\SlopAudioConnect_artefacts\Release\SlopAudio Connect.exe",
            "build\SlopAudioConnect_artefacts\SlopAudio Connect.exe",
            "build\SlopAudioConnect_artefacts\Release\SlopAudioConnect.exe",
            "build\SlopAudioConnect_artefacts\SlopAudioConnect.exe"
          )
          $src = $search | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $src) { Get-ChildItem -Recurse build\SlopAudioConnect_artefacts; exit 1 }
          Copy-Item $src dist\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.archive }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
